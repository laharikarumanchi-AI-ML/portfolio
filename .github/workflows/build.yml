name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify dist/ produced expected pages
        run: |
          test -f dist/index.html
          test -f dist/about/index.html
          test -f dist/blog/index.html
          test -f dist/sitemap-index.xml
          test -f dist/favicon.svg
          test -f dist/og-default.png
          echo "All expected files present."
